services:
  openagent-canary:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openagent-canary
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3001}:3000"
    volumes:
      - openagent-canary-data:/data
      - openagent-canary-workspace:/workspace
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - TZ=${TZ:-Europe/Vienna}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - WHISPER_URL=${WHISPER_URL:-https://whisper.jansohn.xyz/inference}
      - VOICE_REWRITE_ENABLED=${VOICE_REWRITE_ENABLED:-false}

volumes:
  openagent-canary-data:
  openagent-canary-workspace:
