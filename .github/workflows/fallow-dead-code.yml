name: Fallow Dead Code

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: fallow-dead-code-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  dead-code:
    name: Dead code and dependency analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Check dead code and dependencies
        run: npx fallow dead-code --fail-on-issues
