services:
  openagent:
    build: .
    container_name: openagent
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - openagent-data:/data
      - openagent-workspace:/workspace
    environment:
      - NODE_ENV=production
      - DATA_DIR=/data
      - PORT=3000

  # Uncomment to enable local Ollama for running local LLM models
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: openagent-ollama
  #   restart: unless-stopped
  #   ports:
  #     - "11434:11434"
